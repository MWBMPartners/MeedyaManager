#
# Description:
# GitHub Actions build pipeline that creates platform-specific distribution
# packages for MediaMancer upon push to tagged release (e.g. v1.0-M1).
# This workflow also publishes artifacts as GitHub Release assets.
# ============================================================================

name: 📦 MediaMancer Build & Package

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📁 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🏗️ Build distribution folder
        run: |
          mkdir -p dist/MediaMancer
          cp -r core cli settings.json5 LICENSE.md README.md dist/MediaMancer/

      - name: 📦 Compress build into archive
        run: |
          cd dist
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            powershell Compress-Archive -Path MediaMancer -DestinationPath MediaMancer-${{ runner.os }}.zip
          else
            tar -czf MediaMancer-${{ runner.os }}.tar.gz MediaMancer
          fi

      - name: 📤 Upload build artifacts to Actions
        uses: actions/upload-artifact@v4
        with:
          name: MediaMancer-${{ runner.os }}
          path: |
            dist/*.zip
            dist/*.tar.gz

      - name: 🚀 Attach build to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}