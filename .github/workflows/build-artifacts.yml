#
# Description:
# GitHub Actions workflow to package MediaMancer for release on version tag.
# Builds ZIP (Windows) and TAR.GZ (macOS/Linux) archives and uploads them
# to the GitHub Releases tab automatically, including SHA256 checksums.
# ============================================================================

name: 📦 MetaMancer Release Packager

on:
  push:
    tags:
      - "v*"

jobs:
  build-artifacts:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: 📥 Checkout project
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install build requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest python-dotenv

      - name: 🔐 Validate .env loading works
        run: |
          echo "BUILD_ENV_SANITY=1" > .env
          python -c "from utils.env_loader import load_env_variables; load_env_variables(); import os; assert os.getenv('BUILD_ENV_SANITY') == '1'"

      - name: 🧪 Run sanity test (optional)
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}"
          echo "PYTHONPATH is set to: $PYTHONPATH"
          python -c "from core.metadata_extractor import extract_metadata; print('Sanity test passed')"

      - name: 📁 Prepare dist folder
        run: |
          mkdir -p dist/MediaMancer
          cp -r cli core settings.json5 README.md LICENSE.md dist/MediaMancer/
          if [ -d branding ]; then cp -r branding dist/MediaMancer/; fi

      - name: 📦 Compress for ${{ matrix.os }}
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            powershell -Command "Compress-Archive -Path dist/MediaMancer -DestinationPath dist/MediaMancer-${{ matrix.os }}.zip"
          else
            tar -czf dist/MediaMancer-${{ matrix.os }}.tar.gz dist/MediaMancer/
          fi

      - name: 🔐 Generate SHA256 checksums
        shell: bash
        run: |
          cd dist
          if [[ -f MediaMancer-${{ matrix.os }}.zip ]]; then
            shasum -a 256 MediaMancer-${{ matrix.os }}.zip > MediaMancer-${{ matrix.os }}.zip.sha256
          fi
          if [[ -f MediaMancer-${{ matrix.os }}.tar.gz ]]; then
            shasum -a 256 MediaMancer-${{ matrix.os }}.tar.gz > MediaMancer-${{ matrix.os }}.tar.gz.sha256
          fi

      - name: 🚀 Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MediaMancer-${{ matrix.os }}.zip
            dist/MediaMancer-${{ matrix.os }}.zip.sha256
            dist/MediaMancer-${{ matrix.os }}.tar.gz
            dist/MediaMancer-${{ matrix.os }}.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}