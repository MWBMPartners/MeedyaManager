#
# Description:
# GitHub Actions configuration for MeedyaManager project. This CI script will
# automatically run Python-based unit tests on every push and pull request to
# main, dev, or milestone branches.
#
# Key Features:
# - Python 3.11 on all platforms (Linux, macOS, Windows)
# - Installs all dependencies including GUI (PySide6)
# - Runs core + CLI tests, then GUI tests in offscreen mode
# - Verifies that core modules compile
# ============================================================================

name: CI - MeedyaManager Tests

on:
  push:
    branches: [main, dev, milestone-*]
  pull_request:
    branches: [main, dev, milestone-*]

jobs:
  build-test:
    name: "Python Tests on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pymediainfo pytest pytest-cov python-dotenv PySide6 darkdetect

      - name: Run core + CLI tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ --ignore=tests/test_gui_smoke.py --ignore=tests/test_gui_preview_model.py --maxfail=3 --disable-warnings --tb=short

      - name: Run GUI tests (offscreen mode)
        env:
          PYTHONPATH: ${{ github.workspace }}
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest tests/test_gui_smoke.py tests/test_gui_preview_model.py --maxfail=3 --disable-warnings --tb=short

      - name: Validate import integrity
        run: |
          python -m compileall .

      - name: Summary
        run: echo "✅ All tests and import checks completed."
