#
# Description:
# GitHub Actions CI workflow for building native platform installers.
# Triggered on version tags (v*). Builds with Nuitka, then packages:
#   - macOS (ARM64): .dmg with drag-to-Applications
#   - Windows (x64): .exe installer via Inno Setup
#   - Linux (x64): .AppImage + .deb package
#
# All artifacts are uploaded to the GitHub Release with SHA256 checksums.
# ============================================================================

name: Build Native Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:                                       # Allow manual trigger

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: "MeedyaManager"
  APP_VERSION: "1.5"

jobs:
  # =========================================================================
  # macOS — ARM64 .dmg installer
  # =========================================================================
  build-macos:
    name: "macOS (ARM64) — .dmg"
    runs-on: macos-14                                      # Apple Silicon runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache Nuitka compilation
        uses: actions/cache@v4
        with:
          path: ~/.cache/Nuitka
          key: ${{ runner.os }}-nuitka-${{ hashFiles('meedyamanager_gui.py') }}
          restore-keys: ${{ runner.os }}-nuitka-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PySide6 darkdetect nuitka ordered-set

      - name: Build with Nuitka (GUI)
        run: |
          python -m nuitka \
            --standalone \
            --enable-plugin=pyside6 \
            --macos-create-app-bundle \
            --macos-app-name="${{ env.APP_NAME }}" \
            --macos-app-icon=assets/icon.icns \
            --include-data-dir=config=config \
            --include-data-dir=help=help \
            --include-data-dir=ui/themes=ui/themes \
            --include-data-dir=assets=assets \
            --output-dir=dist \
            meedyamanager_gui.py

      - name: Build with Nuitka (CLI)
        run: |
          python -m nuitka \
            --standalone \
            --include-data-dir=config=config \
            --output-dir=dist \
            meedyamanager_cli.py

      - name: Create .dmg installer
        run: |
          # Install create-dmg
          brew install create-dmg

          # Create the DMG with drag-to-Applications layout
          create-dmg \
            --volname "${{ env.APP_NAME }}" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${{ env.APP_NAME }}.app" 150 185 \
            --hide-extension "${{ env.APP_NAME }}.app" \
            --app-drop-link 450 185 \
            "dist/${{ env.APP_NAME }}-${{ env.APP_VERSION }}-macOS-ARM64.dmg" \
            "dist/meedyamanager_gui.app" \
          || true  # create-dmg returns non-zero on some warnings

      - name: Generate SHA256 checksum
        run: |
          cd dist
          shasum -a 256 "${{ env.APP_NAME }}-${{ env.APP_VERSION }}-macOS-ARM64.dmg" \
            > "${{ env.APP_NAME }}-${{ env.APP_VERSION }}-macOS-ARM64.dmg.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            dist/${{ env.APP_NAME }}-${{ env.APP_VERSION }}-macOS-ARM64.dmg
            dist/${{ env.APP_NAME }}-${{ env.APP_VERSION }}-macOS-ARM64.dmg.sha256

  # =========================================================================
  # Windows — x64 .exe installer (Inno Setup)
  # =========================================================================
  build-windows:
    name: "Windows (x64) — .exe"
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache Nuitka compilation
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka
          key: ${{ runner.os }}-nuitka-${{ hashFiles('meedyamanager_gui.py') }}
          restore-keys: ${{ runner.os }}-nuitka-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PySide6 darkdetect nuitka ordered-set

      - name: Build with Nuitka (GUI)
        run: |
          python -m nuitka `
            --standalone `
            --enable-plugin=pyside6 `
            --windows-icon-from-ico=assets/icon.ico `
            --windows-console-mode=disable `
            --include-data-dir=config=config `
            --include-data-dir=help=help `
            --include-data-dir=ui/themes=ui/themes `
            --include-data-dir=assets=assets `
            --output-dir=dist `
            meedyamanager_gui.py

      - name: Build with Nuitka (CLI)
        run: |
          python -m nuitka `
            --standalone `
            --include-data-dir=config=config `
            --output-dir=dist `
            meedyamanager_cli.py

      - name: Build Inno Setup installer
        run: |
          iscc build/innosetup.iss

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          cd dist/installer
          sha256sum *.exe > checksum.sha256 || shasum -a 256 *.exe > checksum.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/installer/*.exe
            dist/installer/*.sha256

  # =========================================================================
  # Linux — x64 .AppImage + .deb
  # =========================================================================
  build-linux:
    name: "Linux (x64) — .AppImage + .deb"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache Nuitka compilation
        uses: actions/cache@v4
        with:
          path: ~/.cache/Nuitka
          key: ${{ runner.os }}-nuitka-${{ hashFiles('meedyamanager_gui.py') }}
          restore-keys: ${{ runner.os }}-nuitka-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmediainfo-dev \
            libfuse2 \
            desktop-file-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PySide6 darkdetect nuitka ordered-set

      - name: Build with Nuitka (GUI)
        run: |
          python -m nuitka \
            --standalone \
            --enable-plugin=pyside6 \
            --linux-icon=assets/icon.png \
            --include-data-dir=config=config \
            --include-data-dir=help=help \
            --include-data-dir=ui/themes=ui/themes \
            --include-data-dir=assets=assets \
            --output-dir=dist \
            meedyamanager_gui.py

      - name: Build with Nuitka (CLI)
        run: |
          python -m nuitka \
            --standalone \
            --include-data-dir=config=config \
            --output-dir=dist \
            meedyamanager_cli.py

      - name: Create AppImage
        run: |
          # Download linuxdeploy
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          # Prepare AppDir structure
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/512x512/apps

          # Copy Nuitka build output
          cp -r dist/meedyamanager_gui.dist/* AppDir/usr/bin/
          cp dist/meedyamanager_cli.dist/meedyamanager_cli AppDir/usr/bin/ || true

          # Copy desktop entry and icon
          cp build/meedyamanager.desktop AppDir/usr/share/applications/
          cp assets/icon.png AppDir/usr/share/icons/hicolor/512x512/apps/meedyamanager.png

          # Create the AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file build/meedyamanager.desktop \
            --icon-file assets/icon.png \
            --output appimage

          # Rename output
          mv MeedyaManager-*.AppImage "dist/${{ env.APP_NAME }}-${{ env.APP_VERSION }}-Linux-x64.AppImage" || \
          mv *.AppImage "dist/${{ env.APP_NAME }}-${{ env.APP_VERSION }}-Linux-x64.AppImage"

      - name: Create .deb package
        run: |
          DEB_DIR="dist/deb-staging"
          mkdir -p "$DEB_DIR/DEBIAN"
          mkdir -p "$DEB_DIR/usr/bin"
          mkdir -p "$DEB_DIR/usr/share/applications"
          mkdir -p "$DEB_DIR/usr/share/icons/hicolor/512x512/apps"
          mkdir -p "$DEB_DIR/opt/meedyamanager"

          # Copy Nuitka output to /opt/meedyamanager
          cp -r dist/meedyamanager_gui.dist/* "$DEB_DIR/opt/meedyamanager/"
          cp dist/meedyamanager_cli.dist/meedyamanager_cli "$DEB_DIR/opt/meedyamanager/" || true

          # Create symlinks in /usr/bin
          ln -s /opt/meedyamanager/meedyamanager_gui "$DEB_DIR/usr/bin/meedyamanager-gui"
          ln -s /opt/meedyamanager/meedyamanager_cli "$DEB_DIR/usr/bin/meedyamanager" || true

          # Copy desktop entry and icon
          cp build/meedyamanager.desktop "$DEB_DIR/usr/share/applications/"
          cp assets/icon.png "$DEB_DIR/usr/share/icons/hicolor/512x512/apps/meedyamanager.png"

          # Create DEBIAN/control
          cat > "$DEB_DIR/DEBIAN/control" << 'CTRL'
          Package: meedyamanager
          Version: ${{ env.APP_VERSION }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: MWBM Partners Ltd <dev@mwbmpartners.ltd>
          Description: MeedyaManager - Cross-platform media file manager
           Scan, classify, and organize media files using metadata-driven rules.
           Supports all popular audio and video formats with drag-and-drop GUI.
          CTRL

          # Build the .deb
          dpkg-deb --build "$DEB_DIR" "dist/${{ env.APP_NAME }}-${{ env.APP_VERSION }}-Linux-x64.deb"

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum "${{ env.APP_NAME }}-${{ env.APP_VERSION }}-Linux-x64.AppImage" \
            > "${{ env.APP_NAME }}-${{ env.APP_VERSION }}-Linux-x64.AppImage.sha256"
          sha256sum "${{ env.APP_NAME }}-${{ env.APP_VERSION }}-Linux-x64.deb" \
            > "${{ env.APP_NAME }}-${{ env.APP_VERSION }}-Linux-x64.deb.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            dist/${{ env.APP_NAME }}-${{ env.APP_VERSION }}-Linux-x64.AppImage
            dist/${{ env.APP_NAME }}-${{ env.APP_VERSION }}-Linux-x64.AppImage.sha256
            dist/${{ env.APP_NAME }}-${{ env.APP_VERSION }}-Linux-x64.deb
            dist/${{ env.APP_NAME }}-${{ env.APP_VERSION }}-Linux-x64.deb.sha256

  # =========================================================================
  # Release — Upload all platform installers to GitHub Releases
  # =========================================================================
  release:
    name: "Create GitHub Release"
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
