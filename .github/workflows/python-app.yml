# Description:
# GitHub Actions CI test matrix for the MediaMancer project.
# Includes PYTHONPATH config, coverage reports, and fallback config file generation.
# ============================================================================

name: 🧪 MediaMancer CI Test Matrix

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov python-dotenv

      - name: 📄 Generate fallback settings.json5 for CI
        run: |
          echo '{
            simulate: true,
            log_path: "./logs/",
            default_watch_path: "./watch/"
          }' > settings.json5

      - name: 🔐 Verify .env loader functionality
        run: |
          echo "TEST_ENV_KEY=ci_env_check" > .env
          python -c "from utils.env_loader import load_env_variables; load_env_variables(); import os; assert os.getenv('TEST_ENV_KEY') == 'ci_env_check'"

      - name: 🧪 Run full test suite with coverage
        run: |
          cd $GITHUB_WORKSPACE
          export PYTHONPATH="$GITHUB_WORKSPACE"
          echo "PYTHONPATH is set to: $PYTHONPATH"
          pytest --rootdir=. tests/ --cov=core --cov=cli --cov=utils --cov-report=xml --maxfail=1 --disable-warnings --tb=short

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true

      - name: 📤 Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-logs-${{ matrix.os }}-${{ matrix.python-version }}
          path: .pytest_cache/