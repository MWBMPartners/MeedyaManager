# Description:
# GitHub Actions CI test matrix for the MetaMancer project.
# Validates metadata extraction, CLI tools, checksum verifier, and env loader.
# ============================================================================

name: 🧪 MetaMancer CI Test Matrix

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: 🔐 Verify .env loader functionality
        run: |
          echo "TEST_ENV_KEY=ci_env_check" > .env
          python -c "from utils.env_loader import load_env_variables; load_env_variables(); import os; assert os.getenv('TEST_ENV_KEY') == 'ci_env_check'"

      - name: 🧪 Run full test suite including checksum verifier
        run: |
          pytest tests/ --maxfail=1 --disable-warnings --tb=short

      - name: 📤 Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-logs-${{ matrix.os }}-${{ matrix.python-version }}
          path: .pytest_cache/