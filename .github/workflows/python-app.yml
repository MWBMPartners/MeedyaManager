# Description:
# GitHub Actions CI test matrix for the MeedyaManager project.
# Runs core + CLI tests on all platforms, and GUI tests in offscreen mode.
# Includes PYTHONPATH config and coverage reports.
# ============================================================================

name: 🧪 MeedyaManager CI Test Matrix

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov python-dotenv

      - name: 🖥️ Install GUI dependencies
        run: |
          pip install PySide6 darkdetect

      - name: 🔐 Verify .env loader functionality
        run: |
          echo "TEST_ENV_KEY=ci_env_check" > .env
          python -c "from utils.env_loader import load_env_variables; load_env_variables(); import os; assert os.getenv('TEST_ENV_KEY') == 'ci_env_check'"

      - name: 🧪 Run core + CLI tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest --rootdir=. tests/ --ignore=tests/test_gui_smoke.py --ignore=tests/test_gui_preview_model.py --cov=core --cov=cli --cov=utils --cov-report=xml --disable-warnings --tb=short

      - name: 🖼️ Run GUI tests (offscreen mode)
        env:
          PYTHONPATH: ${{ github.workspace }}
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest --rootdir=. tests/test_gui_smoke.py tests/test_gui_preview_model.py --cov=ui --cov-append --cov-report=xml --disable-warnings --tb=short

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true

      - name: 📤 Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-logs-${{ matrix.os }}-${{ matrix.python-version }}
          path: .pytest_cache/
