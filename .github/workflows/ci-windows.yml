# MeedyaManager — Windows WinUI 3 CI

name: Windows CI

on:
  # Direct pushes to main still trigger native runs.
  push:
    branches: [main]
    paths:
      - "windows/**"
      - "crates/mm-ffi/**"
  # PRs reach this workflow via pr-gate.yml (the umbrella). Do NOT add a
  # pull_request: trigger here or runs will duplicate.
  workflow_call:

jobs:
  windows-ci:
    name: Windows WinUI 3
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build mm-ffi native library
        # Compile the cbindgen/csbindgen Rust FFI crate that produces mm_ffi.dll
        # and the C header used by the C# P/Invoke layer.
        run: cargo build -p mm-ffi --release

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore NuGet packages
        working-directory: windows
        run: dotnet restore

      - name: Build WinUI 3 application
        working-directory: windows
        # --verbosity diagnostic (highest) + tee output to file + binary log.
        # MSB3073 from XamlCompiler is opaque ("command exited with code 1");
        # diagnostic-level output should surface its actual stderr/stdout.
        # The .binlog is uploaded as an artifact on failure for offline
        # inspection with the MSBuild Structured Log Viewer (msbuildlog.com).
        shell: pwsh
        run: |
          dotnet build --no-restore --verbosity diagnostic `
            -bl:msbuild.binlog `
            -fl -flp:logfile=msbuild.log`;verbosity=diagnostic 2>&1 |
            Tee-Object -FilePath build.out

      - name: Dump XamlCompiler I/O + msbuild.log error context on failure
        if: failure()
        working-directory: windows
        shell: pwsh
        run: |
          Write-Host "=== Searching for XamlCompiler input/output JSON files ==="
          $jsonFiles = @()
          $jsonFiles += Get-ChildItem -Recurse -Path . -Filter input.json -ErrorAction SilentlyContinue
          $jsonFiles += Get-ChildItem -Recurse -Path . -Filter output.json -ErrorAction SilentlyContinue
          if ($jsonFiles.Count -eq 0) {
            Write-Host "(no input.json / output.json files found anywhere under windows/)"
          } else {
            foreach ($f in $jsonFiles) {
              Write-Host "===== $($f.FullName) ====="
              Get-Content $f.FullName | Out-Host
            }
          }

          Write-Host ""
          Write-Host "=== msbuild.log error context (50 lines around each 'error') ==="
          if (Test-Path msbuild.log) {
            $lines = Get-Content msbuild.log
            for ($i = 0; $i -lt $lines.Length; $i++) {
              if ($lines[$i] -match 'error\s|: error |XamlCompiler.*exit') {
                $start = [Math]::Max(0, $i - 5)
                $end = [Math]::Min($lines.Length - 1, $i + 20)
                Write-Host "----- match at line $($i+1) -----"
                Write-Host ($lines[$start..$end] -join "`n")
                Write-Host ""
              }
            }
          } else {
            Write-Host "(msbuild.log not produced)"
          }

      - name: Upload MSBuild logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-logs-${{ github.run_id }}
          path: |
            windows/msbuild.binlog
            windows/msbuild.log
            windows/build.out
            windows/**/obj/**/input.json
            windows/**/obj/**/output.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Run .NET unit tests
        working-directory: windows
        # Runs C# unit tests that replicate pure logic without requiring the
        # WinUI 3 XAML runtime (which is not available on GitHub runners).
        run: dotnet test --no-build --verbosity normal
