# MeedyaManager — Windows WinUI 3 CI

name: Windows CI

on:
  # Direct pushes to main still trigger native runs.
  push:
    branches: [main]
    paths:
      - "windows/**"
      - "crates/mm-ffi/**"
  # PRs reach this workflow via pr-gate.yml (the umbrella). Do NOT add a
  # pull_request: trigger here or runs will duplicate.
  workflow_call:

jobs:
  windows-ci:
    name: Windows WinUI 3
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build mm-ffi native library
        # Compile the cbindgen/csbindgen Rust FFI crate that produces mm_ffi.dll
        # and the C header used by the C# P/Invoke layer.
        run: cargo build -p mm-ffi --release

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore NuGet packages
        working-directory: windows
        run: dotnet restore

      - name: Build WinUI 3 application
        working-directory: windows
        # --verbosity detailed + binary log so XamlCompiler errors are
        # capturable. Without this, MSB3073 from the XAML compiler is opaque
        # ("command exited with code 1") with no hint as to which XAML/code
        # issue caused the failure. The .binlog is uploaded as an artifact on
        # failure (see next step) so the user can open it locally with the
        # MSBuild Structured Log Viewer (https://msbuildlog.com).
        run: dotnet build --no-restore --verbosity detailed -bl:msbuild.binlog

      - name: Dump XamlCompiler I/O on failure
        if: failure()
        working-directory: windows
        shell: pwsh
        # When XamlCompiler.exe fails, its real error message is NOT in the
        # MSBuild log. The error often surfaces in input.json / output.json
        # under obj/. Print every such file's contents so the next CI run
        # surfaces the underlying error inline.
        run: |
          Get-ChildItem -Recurse -Path obj -Filter input.json -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "===== $($_.FullName) ====="
            Get-Content $_.FullName | Out-Host
          }
          Get-ChildItem -Recurse -Path obj -Filter output.json -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "===== $($_.FullName) ====="
            Get-Content $_.FullName | Out-Host
          }

      - name: Upload MSBuild binary log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-binlog-${{ github.run_id }}
          path: windows/msbuild.binlog
          if-no-files-found: ignore
          retention-days: 7

      - name: Run .NET unit tests
        working-directory: windows
        # Runs C# unit tests that replicate pure logic without requiring the
        # WinUI 3 XAML runtime (which is not available on GitHub runners).
        run: dotnet test --no-build --verbosity normal
