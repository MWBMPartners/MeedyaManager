ReleaseNotes: >
  v1.0.0 — First public stable release.

  Highlights:
  - Secure HTTPS media server (mm-server) with JWT authentication and
    RFC 7233 Range-request streaming
  - REST API: library listing, search, metadata, and export status endpoints
  - Server UI tab on GTK4 (Linux), SwiftUI (macOS), and WinUI 3 (Windows)
  - Release artifact code signing (Authenticode for Windows, notarisation for macOS)
  - All M0-M10 milestones complete; ~1166 tests passing

  Full changelog: https://github.com/MWBMPartners/MeedyaManager/blob/main/docs/CHANGELOG.md
ReleaseNotesUrl: https://github.com/MWBMPartners/MeedyaManager/releases/tag/v1.0.0

